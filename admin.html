<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>중마스포츠축제 관리자</title>
  <style>
    :root{
      --bg:#edf3fb;
      --bg2:#f8fbff;
      --card:#ffffff;
      --line:#e6edf5;
      --text:#0f172a;
      --sub:#667085;
      --blue:#1677ff;
      --blue2:#0a84ff;
      --blue-soft:#eef6ff;
      --green:#16a34a;
      --red:#dc2626;
      --radius:22px;
      --shadow:0 14px 34px rgba(15,23,42,.08);
      --shadow-soft:0 8px 20px rgba(15,23,42,.05);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
      background:
        radial-gradient(circle at top left, #ffffff 0%, var(--bg2) 26%, var(--bg) 78%);
      color:var(--text);
      line-height:1.45;
    }
    button,input,select{font:inherit}
    .app{
      width:100%;
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding:12px 12px 32px;
    }
    .topbar{
      position:relative;
      top:auto;
      left:auto;
      transform:none;
      z-index:auto;
      width:100%;
      padding:0;
      margin-bottom:12px;
      background:transparent;
    }
    .topbar-inner{
      background:#ffffff;
      border:1px solid #e7eef8;
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .brand-title{
      font-size:1.25rem;
      font-weight:900;
      letter-spacing:-.03em;
    }
    .brand-sub{
      font-size:.76rem;
      color:var(--sub);
      margin-top:2px;
    }
    .card{
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:17px;
      margin-top:12px;
    }
    h1,h2,p{margin:0}
    .title{
      font-size:1.06rem;
      font-weight:900;
      letter-spacing:-.03em;
      margin-bottom:4px;
    }
    .subtitle{
      font-size:.98rem;
      font-weight:900;
      letter-spacing:-.02em;
      margin-bottom:4px;
    }
    .desc{
      font-size:.87rem;
      color:var(--sub);
      line-height:1.62;
      word-break:keep-all;
    }
    .field{margin-top:12px}
    label{
      display:block;
      margin-bottom:6px;
      font-size:.79rem;
      font-weight:800;
      color:#475569;
    }
    .input,.select{
      width:100%;
      min-height:54px;
      border:1px solid #d7deea;
      background:#fff;
      border-radius:16px;
      padding:0 14px;
      color:var(--text);
      font-size:16px;
      outline:none;
      box-shadow:0 2px 6px rgba(15,23,42,.02) inset;
    }
    .input:focus,.select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.12);
    }
    .btn-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .btn{
      min-height:50px;
      border:none;
      border-radius:16px;
      padding:0 16px;
      font-size:.93rem;
      font-weight:800;
      cursor:pointer;
      flex:1;
      white-space:nowrap;
      box-shadow:var(--shadow-soft);
    }
    .btn:disabled{opacity:.65;cursor:default}
    .btn-primary{
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff;
    }
    .btn-soft{
      background:#eef2f7;
      color:#334155;
      border:1px solid #dbe2ea;
    }
    .btn-ghost{
      background:#eef6ff;
      color:#0b63ce;
      border:1px solid #cfe4ff;
    }
    .toggle-btn{
      width:100%;
      min-height:48px;
      border:1px solid #dbe2ea;
      background:#f8fafc;
      color:#334155;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px;
      font-size:.92rem;
      font-weight:800;
      cursor:pointer;
      margin-top:12px;
    }
    .toggle-panel{
      display:none;
      margin-top:12px;
      padding:14px;
      border:1px solid #e5e7eb;
      border-radius:16px;
      background:#fbfdff;
    }
    .toggle-panel.show{display:block}
    .status{
      display:none;
      padding:12px 14px;
      border-radius:16px;
      font-size:.88rem;
      font-weight:800;
      line-height:1.5;
      margin-top:10px;
    }
    .status.show{display:block}
    .status.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .status.success{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
    .status.error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .helper-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .count-badge{
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#f1f5f9;
      color:#334155;
      border:1px solid #e2e8f0;
      font-size:.76rem;
      font-weight:800;
    }

    .auto-badge{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#eef6ff;
      color:#1d4ed8;
      border:1px solid #cfe4ff;
      font-size:.75rem;
      font-weight:800;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .auto-badge.success{
      background:#ecfdf5;
      color:#166534;
      border-color:#bbf7d0;
    }
    .auto-badge.error{
      background:#fef2f2;
      color:#b91c1c;
      border-color:#fecaca;
    }


    .selector-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }
    .selector-grid.subgroup-grid{
      grid-template-columns:repeat(auto-fit,minmax(0,1fr));
      padding:8px;
      border-radius:22px;
      background:linear-gradient(180deg,#f6f1ff 0%, #eef4ff 100%);
      border:1px solid #eadcff;
      box-shadow:0 10px 24px rgba(168,85,247,0.08);
    }
    .selector-chip{
      width:100%;
      min-width:0;
      min-height:44px;
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg,#f6f1ff 0%, #eef4ff 100%);
      color:var(--sub);
      font-size:.8rem;
      font-weight:800;
      line-height:1;
      padding:12px 10px;
      cursor:pointer;
      white-space:nowrap;
      border:1px solid #e6dcff;
      letter-spacing:-0.01em;
      box-shadow:none;
      transition:all .2s ease;
    }
    .selector-grid.subgroup-grid .selector-chip{
      background:transparent;
      border:none;
      min-height:42px;
      transform:translateY(0);
      box-shadow:none;
    }
    .selector-chip:hover{
      background:linear-gradient(180deg,#ffffff 0%, #f7f3ff 100%);
    }
    .selector-chip:active{
      transform:scale(0.98);
    }
    .selector-chip.active{
      background:#ffffff;
      color:var(--blue2);
      box-shadow:0 6px 18px rgba(15,23,42,0.10);
      transform:translateY(-1px) scale(1.01);
      border:1px solid #dbeafe;
    }
    .selector-grid.subgroup-grid .selector-chip.active{
      border:1px solid #dbeafe;
      box-shadow:0 8px 18px rgba(59,130,246,0.14);
      transform:translateY(-1px) scale(1.02);
    }
    .select-guide{
      width:100%;
      margin-top:12px;
      padding:22px 18px;
      border-radius:28px;
      border:2px dashed #d1d1d6;
      background:#f2f2f7;
      text-align:center;
    }
    .select-guide-title{
      margin:0;
      font-size:1rem;
      font-weight:900;
      line-height:1.3;
      letter-spacing:-0.03em;
      color:#1c1c1e;
      word-break:keep-all;
    }
    .select-guide-desc{
      margin:12px 0 0;
      font-size:.92rem;
      line-height:1.6;
      letter-spacing:-0.02em;
      color:#6e6e73;
      word-break:keep-all;
    }

    .summary-box{
      margin-top:12px;
      padding:13px 14px;
      border:1px solid #dbeafe;
      background:linear-gradient(180deg,#fafdff,#f4f9ff);
      border-radius:18px;
    }
    .summary-title{
      font-size:.78rem;
      font-weight:900;
      color:#2563eb;
      margin-bottom:4px;
    }
    .summary-text{
      font-size:.9rem;
      color:#334155;
      line-height:1.55;
      word-break:keep-all;
    }
    .empty{
      padding:22px 14px;
      text-align:center;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      color:var(--sub);
      background:#fff;
    }
    .match-card{
      border:1px solid var(--line);
      border-radius:20px;
      padding:15px;
      background:#fff;
      margin-top:12px;
      box-shadow:var(--shadow-soft);
    }
    .match-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .match-title{
      font-size:1rem;
      font-weight:900;
      letter-spacing:-.02em;
      line-height:1.45;
    }
    .match-sub{
      margin-top:4px;
      font-size:.79rem;
      color:var(--sub);
      line-height:1.45;
    }
    .pill{
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:.74rem;
      font-weight:800;
      color:#4338ca;
      background:#eef2ff;
      border:1px solid #c7d2fe;
      white-space:nowrap;
    }
    .team-box{
      border:1px solid #e9eef5;
      border-radius:18px;
      padding:13px;
      background:linear-gradient(180deg,#ffffff,#fafcff);
      margin-top:10px;
    }
    .team-name{
      font-size:.96rem;
      font-weight:900;
      margin-bottom:10px;
      line-height:1.4;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .muted{
      color:var(--sub);
      font-size:.8rem;
      line-height:1.5;
      margin-top:8px;
    }
    .sticky-save{
      position:static;
      padding-top:14px;
      margin-top:14px;
      background:transparent;
    }

    .select{
      appearance:none;
      -webkit-appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, #94a3b8 50%),
        linear-gradient(135deg, #94a3b8 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 3px),
        calc(100% - 16px) calc(50% - 3px);
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:42px;
    }
    .input::placeholder{color:#94a3b8}
    .recent-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }
    .recent-item{
      border:1px solid #e7edf5;
      border-radius:16px;
      background:linear-gradient(180deg,#ffffff,#fbfdff);
      padding:12px 13px;
    }
    .recent-item-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .recent-item-title{
      font-size:.9rem;
      font-weight:800;
      color:#0f172a;
      line-height:1.45;
    }
    .recent-item-sub{
      margin-top:4px;
      font-size:.78rem;
      color:var(--sub);
      line-height:1.5;
    }
    .recent-time{
      flex:0 0 auto;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      color:#475569;
      font-size:.73rem;
      font-weight:800;
      white-space:nowrap;
    }


    .topbar{
      backdrop-filter:saturate(180%) blur(10px);
    }
    .topbar-inner{
      position:relative;
    }
    .topbar-meta{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:6px;
    }
    .sync-text{
      font-size:.74rem;
      color:var(--sub);
      font-weight:700;
      white-space:nowrap;
    }
    .topbar-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }
    .mini-btn{
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid #dbe2ea;
      background:#f8fafc;
      color:#334155;
      font-size:.8rem;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }
    .mini-btn.primary{
      background:#eef6ff;
      color:#0b63ce;
      border-color:#cfe4ff;
    }
    .mini-btn:disabled{
      opacity:.5;
      cursor:default;
    }
    .undo-box{
      margin-top:10px;
      padding:12px 13px;
      border:1px solid #fde68a;
      border-radius:16px;
      background:linear-gradient(180deg,#fffdf4,#fffbeb);
    }
    .undo-title{
      font-size:.85rem;
      font-weight:900;
      color:#92400e;
    }
    .undo-desc{
      margin-top:4px;
      font-size:.78rem;
      line-height:1.5;
      color:#7c5a10;
    }
    .undo-row{
      margin-top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    @media (max-width:460px){
      .app{padding:12px 10px 24px}
      .topbar{top:auto;width:100%}
      .topbar-inner{padding:15px 16px;border-radius:22px}
      .brand-title{font-size:1.2rem}
      .brand-sub{font-size:.73rem}
      .card{padding:14px}
      .grid2{grid-template-columns:1fr}
      .btn{width:100%}
      .count-badge{min-height:26px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="brand-title">중마스포츠축제 관리자</div>
          
        </div>
      </div>
    </div>

    <section class="card">
      <div class="helper-row">
        <div>
          <h1 class="title">자동 연결 설정</h1>
        </div>
        <span id="autoLoadBadge" class="auto-badge">자동 연결 대기</span>
      </div>

      <button id="toggleSettingsBtn" class="toggle-btn" type="button">
        <span>연결 정보 보기</span>
        <span id="toggleSettingsIcon">▼</span>
      </button>

      <div id="settingsPanel" class="toggle-panel">
        <div class="field">
          <label for="scriptUrl">Apps Script 웹앱 URL</label>
          <input id="scriptUrl" class="input" />
        </div>
        <div class="field">
          <label for="adminKey">관리자 키</label>
          <input id="adminKey" class="input" type="password" />
        </div>
        <div class="btn-row">
          <button id="saveConfigBtn" class="btn btn-soft" type="button">브라우저에 저장</button>
          <button id="reloadBtn" class="btn btn-ghost" type="button">다시 불러오기</button>
          <button id="clearConfigBtn" class="btn btn-soft" type="button">저장값 삭제</button>
        </div>
        <p class="muted">GitHub 공개용 권장: 관리자 키와 웹앱 URL은 파일 안에 넣지 말고, 이 화면에서 입력한 뒤 브라우저에만 저장하세요.</p>
      </div>
    </section>

    <div id="status" class="status"></div>

    <section class="card">
      <div class="helper-row">
        <div>
          <h2 class="subtitle">종목 선택</h2>
        </div>
      </div>
      <div id="selectorWrap" style="margin-top:12px;">
        <div class="empty">종목과 구분을 선택하면 입력창이 열립니다.</div>
      </div>
    </section>

    <section class="card">
      <div class="helper-row">
        <div>
          <h2 class="subtitle">경기 / 기록 입력</h2>
                  </div>
      </div>
      <div id="editorWrap" style="margin-top:12px;">
        <div class="empty">종목과 구분을 선택하면 입력창이 열립니다.</div>
      </div>
    </section>

    <section class="card">
      <div class="helper-row">
        <div>
          <h2 class="subtitle">최근 저장 5개</h2>
          <p class="desc">방금 저장한 경기와 항목을 확인할 수 있습니다.</p>
        </div>
      </div>
      <div id="undoWrap"></div>
      <div id="recentWrap" class="recent-list">
        <div class="empty">아직 저장한 내역이 없습니다.</div>
      </div>
    </section>
  </div>

  <script>
    const APP_CONFIG = {
      scriptUrl: '',
      adminKey: '',
      autoLoad: false
    };

    const state = {
      groups: [],
      selectedSport: '',
      selectedSubgroup: '',
      selectedMatchByGroup: {},
      editorModeByGroup: {},
      isSettingsOpen: false,
      recentSaves: [],
      pendingUndo: null,
      lastSyncAt: '',
      autoRefreshTimer: null,
      isLoadingGroups: false
    };

    const els = {
      toggleSettingsBtn: document.getElementById('toggleSettingsBtn'),
      toggleSettingsIcon: document.getElementById('toggleSettingsIcon'),
      settingsPanel: document.getElementById('settingsPanel'),
      scriptUrl: document.getElementById('scriptUrl'),
      adminKey: document.getElementById('adminKey'),
      saveConfigBtn: document.getElementById('saveConfigBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      clearConfigBtn: document.getElementById('clearConfigBtn'),
      autoLoadBadge: document.getElementById('autoLoadBadge'),
      syncText: document.getElementById('syncText'),
      autoRefreshText: document.getElementById('autoRefreshText'),
      undoBtnTop: document.getElementById('undoBtnTop'),
      status: document.getElementById('status'),
      selectorWrap: document.getElementById('selectorWrap'),
      editorWrap: document.getElementById('editorWrap'),
      undoWrap: document.getElementById('undoWrap'),
      recentWrap: document.getElementById('recentWrap')
    };

    init();

    function init(){
      restoreSavedConfig();
      els.scriptUrl.value = APP_CONFIG.scriptUrl;
      els.adminKey.value = APP_CONFIG.adminKey;
      bindEvents();
      restoreRecentSaves();
      restorePendingUndo();
      renderSettings();
      renderPendingUndo();
      renderRecentSaves();
      if (APP_CONFIG.scriptUrl) {
        setAutoBadge(APP_CONFIG.adminKey ? '이번 탭 연결 준비 완료' : '웹앱 URL 저장됨 · 관리자 키 재입력 필요', APP_CONFIG.adminKey ? 'success' : 'info');
      } else {
        setAutoBadge('연결 정보 입력 필요', 'info');
      }
      updateSyncText();
      syncAutoRefreshState();
    }

    function bindEvents(){
      els.toggleSettingsBtn.addEventListener('click', () => {
        state.isSettingsOpen = !state.isSettingsOpen;
        renderSettings();
      });

      els.saveConfigBtn.addEventListener('click', () => {
        APP_CONFIG.scriptUrl = els.scriptUrl.value.trim();
        APP_CONFIG.adminKey = els.adminKey.value.trim();
        APP_CONFIG.autoLoad = Boolean(APP_CONFIG.scriptUrl && APP_CONFIG.adminKey);
        if (!APP_CONFIG.scriptUrl) {
          clearSavedConfig();
          clearSessionConfig();
          setStatus('웹앱 URL을 입력해야 저장됩니다.', 'error');
          setAutoBadge('입력값 확인 필요', 'error');
          return;
        }
        persistConfig();
        persistSessionConfig();
        setStatus('웹앱 URL은 브라우저에 저장했고, 관리자 키는 현재 탭에만 저장했습니다.', 'success');
        setAutoBadge(APP_CONFIG.adminKey ? '현재 탭 연결 완료' : 'URL 저장 완료 · 관리자 키 미저장', APP_CONFIG.adminKey ? 'success' : 'info');
        syncAutoRefreshState();
      });

      els.reloadBtn.addEventListener('click', () => {
        APP_CONFIG.scriptUrl = els.scriptUrl.value.trim();
        APP_CONFIG.adminKey = els.adminKey.value.trim();
        APP_CONFIG.autoLoad = Boolean(APP_CONFIG.scriptUrl && APP_CONFIG.adminKey);
        persistConfig();
        persistSessionConfig();
        syncAutoRefreshState();
        loadGroups(false);
      });

      els.clearConfigBtn.addEventListener('click', () => {
        clearSavedConfig();
        clearSessionConfig();
        APP_CONFIG.scriptUrl = '';
        APP_CONFIG.adminKey = '';
        APP_CONFIG.autoLoad = false;
        els.scriptUrl.value = '';
        els.adminKey.value = '';
        state.groups = [];
        state.selectedSport = '';
        state.selectedSubgroup = '';
        state.lastSyncAt = '';
        stopAutoRefresh();
        renderSelectors();
        renderEditor();
        updateSyncText();
        setStatus('브라우저에 저장된 연결 정보를 삭제했습니다.', 'success');
        setAutoBadge('연결 정보 입력 필요', 'info');
      });

      if (els.undoBtnTop) {

    function restoreSavedConfig(){

        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (parsed && typeof parsed === 'object') {
          APP_CONFIG.scriptUrl = normalize(parsed.scriptUrl || '');

      } catch (error) {}
      try {
        const savedSession = sessionStorage.getItem('sports_admin_session_v1');
        if (!savedSession) return;

          APP_CONFIG.adminKey = normalize(parsedSession.adminKey || '');
          APP_CONFIG.autoLoad = Boolean(APP_CONFIG.scriptUrl && APP_CONFIG.adminKey);

        }));

        }));

    function clearSavedConfig(){

        localStorage.removeItem('sports_admin_config_v2');
        localStorage.removeItem('sports_admin_config_v1');
      } catch (error) {}
    }

    function clearSessionConfig(){
      try {
        sessionStorage.removeItem('sports_admin_session_v1');
      } catch (error) {}
    }

    function restoreRecentSaves(){
      try {
        const saved = localStorage.getItem('sports_admin_recent_saves_v1');
        state.recentSaves = saved ? JSON.parse(saved) : [];
        if (!Array.isArray(state.recentSaves)) state.recentSaves = [];

      }
    }

    function persistRecentSaves(){
      try {
        localStorage.setItem('sports_admin_recent_saves_v1', JSON.stringify(state.recentSaves.slice(0,5)));

    function restorePendingUndo(){
      try {
        const saved = sessionStorage.getItem('sports_admin_pending_undo_v1');
        state.pendingUndo = saved ? JSON.parse(saved) : null;
      } catch (error) {
        state.pendingUndo = null;
      }
      if (!state.pendingUndo || !Array.isArray(state.pendingUndo.updates) || !state.pendingUndo.updates.length) {

    function persistPendingUndo(){

          sessionStorage.removeItem('sports_admin_pending_undo_v1');

        sessionStorage.setItem('sports_admin_pending_undo_v1', JSON.stringify(state.pendingUndo));

    function clearPendingUndo(){
      state.pendingUndo = null;
      persistPendingUndo();
      renderPendingUndo();
    }

    function setPendingUndo(payload){
      state.pendingUndo = payload && Array.isArray(payload.updates) && payload.updates.length ? payload : null;
      persistPendingUndo();
      renderPendingUndo();
    }

    function formatDateTime(value){
      if (!value) return '아직 없음';
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return '아직 없음';
      const hh = String(date.getHours()).padStart(2,'0');
      const mm = String(date.getMinutes()).padStart(2,'0');
      const ss = String(date.getSeconds()).padStart(2,'0');
      return `${hh}:${mm}:${ss}`;
    }

    function updateSyncText(){
      if (els.syncText) {
        els.syncText.textContent = `마지막 동기화: ${formatDateTime(state.lastSyncAt)}`;
      }
      if (els.autoRefreshText) {
        els.autoRefreshText.textContent = APP_CONFIG.autoLoad ? '자동 새로고침: 15초' : '자동 새로고침: 꺼짐';
      }
    }

    function stopAutoRefresh(){
      if (state.autoRefreshTimer) {

        state.autoRefreshTimer = null;
      }
    }

    function syncAutoRefreshState(){
      stopAutoRefresh();
      updateSyncText();
      if (!APP_CONFIG.autoLoad || document.hidden) return;

        if (!document.hidden) loadGroups(true);
      }, 15000);
    }

      const hasUndo = Boolean(state.pendingUndo && Array.isArray(state.pendingUndo.updates) && state.pendingUndo.updates.length);

          </div>

    function formatNow(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }

    function pushRecentSave(label, detail=''){

        <div class="recent-item">

            </div>

    function setStatus(message, type='info'){
      els.status.textContent = message;
      els.status.className = `status show ${type}`;
    }

    function setAutoBadge(message, type='info'){
      if (!els.autoLoadBadge) return;
      els.autoLoadBadge.textContent = message;
      els.autoLoadBadge.className = `auto-badge${type === 'success' ? ' success' : type === 'error' ? ' error' : ''}`;
    }

    function escapeHtml(value=''){
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalize(value=''){
      return String(value).trim();
    }

    function parseNumber(value){
      const text = normalize(value);
      if (text === '') return null;
      const num = Number(text);
      return Number.isFinite(num) ? num : null;
    }


    function sportSupportsPk(sportName=''){
      const sport = normalize(sportName);
      return sport === '축구' || sport === '풋살';
    }
    function stripPrefix(key=''){
      return normalize(key).replace(/^대진_/, '');
    }

    function parseGroupMeta(bracketKey=''){
      const raw = stripPrefix(bracketKey);
      const parts = raw.split('_').filter(Boolean);
      let sport = raw.replaceAll('_', ' ');
      let subgroup = '전체';

      if (parts[0] === '이어달리기' && parts.length >= 2) {
        sport = '이어달리기';
        subgroup = parts.slice(1).join(' ') || '전체';
        return {
          sport: sport.replaceAll('_', ' '),
          subgroup: subgroup.replaceAll('_', ' ')
        };
      }

      if (parts.length >= 2) {
        const last = parts[parts.length - 1];
        if (/(학년|학급|연합)$/.test(last)) {
          sport = parts.slice(0, -1).join(' ');
          subgroup = last;
        } else {
          sport = parts.join(' ');
        }
      }
      return {
        sport: sport.replaceAll('_', ' '),
        subgroup: subgroup.replaceAll('_', ' ')
      };
    }

    function displaySubgroupName(value=''){
      const text = normalize(value).replace(/^학급\s*/, '');
      return text || normalize(value);
    }

    function getGroupMeta(group){
      const meta = parseGroupMeta(group.bracketKey);
      return {
        ...meta,
        subgroup: displaySubgroupName(meta.subgroup)
      };
    }

    function getSportList(){
      const seen = new Set();
      const list = [];
      state.groups.forEach(group => {
        const meta = getGroupMeta(group);
        if (!seen.has(meta.sport)) {
          seen.add(meta.sport);
          list.push(meta.sport);
        }
      });
      return list;
    }

    function getSubgroupList(sport){
      const seen = new Set();
      const list = [];
      state.groups.forEach(group => {
        const meta = getGroupMeta(group);
        if (meta.sport === sport && !seen.has(meta.subgroup)) {
          seen.add(meta.subgroup);
          list.push(meta.subgroup);
        }
      });
      return list;
    }

    function getSelectedGroup(){
      return state.groups.find(group => {
        const meta = getGroupMeta(group);
        return meta.sport === state.selectedSport && meta.subgroup === state.selectedSubgroup;
      }) || null;
    }

    function validateScriptUrl(url){
      const value = normalize(url);
      if (!value) return { ok:false, message:'웹앱 URL이 비어 있습니다.' };
      if (!/^https:\/\/script\.google\.com\/macros\/s\//.test(value)) {
        return { ok:false, message:'Apps Script 배포 URL만 사용할 수 있습니다.' };
      }
      return { ok:true };
    }

    async function loadGroups(isAuto=false){
      if (state.isLoadingGroups) return;
      const baseUrl = els.scriptUrl.value.trim();
      const urlCheck = validateScriptUrl(baseUrl);
      if (!urlCheck.ok) {
        setStatus(urlCheck.message, 'error');
        return;
      }
      state.isLoadingGroups = true;
      setAutoBadge(isAuto ? '자동으로 종목을 불러오는 중' : '불러오는 중', 'info');
      try {
        const res = await fetch(`${baseUrl}?action=getBracketData&_=${Date.now()}`);
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || '종목을 불러오지 못했습니다.');

        state.groups = Array.isArray(json.groups) ? json.groups : [];

        if (!state.groups.length) {
          state.selectedSport = '';
          state.selectedSubgroup = '';
            renderSelectors();
          renderEditor();
          setStatus('불러온 종목이 없습니다.', 'error');
          setAutoBadge('종목 없음', 'error');
          return;
        }

        const sportList = getSportList();
        if (!state.selectedSport || !sportList.includes(state.selectedSport)) {
          state.selectedSport = '';
          state.selectedSubgroup = '';
        } else {
          const subgroupList = getSubgroupList(state.selectedSport);
          if (!state.selectedSubgroup || !subgroupList.includes(state.selectedSubgroup)) {
            state.selectedSubgroup = '';
          }
        }

        renderSelectors();
        renderEditor();
        state.lastSyncAt = new Date().toISOString();
        updateSyncText();
        setAutoBadge(isAuto ? '자동 새로고침 완료' : '자동 연결 완료', 'success');
      } catch (error) {
        setStatus(error.message || '종목을 불러오지 못했습니다.', 'error');
        setAutoBadge('연결 실패', 'error');
      } finally {
        state.isLoadingGroups = false;
      }
    }


    function isKnockoutMatchFilled(matchRows, sportName=''){
      if (!Array.isArray(matchRows) || !matchRows.length) return false;
      if (matchRows.length === 1) return normalize(matchRows[0].col2) !== '';
      const scoresReady = matchRows.every(row => normalize(row.col3) !== '');
      if (!scoresReady) return false;
      const scoreValues = matchRows.map(row => parseNumber(row.col3));
      if (scoreValues.some(value => value == null)) return false;
      if (scoreValues[0] !== scoreValues[1]) return true;
      if (!sportSupportsPk(sportName)) return false;
      const pkReady = matchRows.every(row => normalize(row.col4) !== '');
      if (!pkReady) return false;
      const pkValues = matchRows.map(row => parseNumber(row.col4));
      if (pkValues.some(value => value == null)) return false;
      return pkValues[0] !== pkValues[1];
    }

    function getIncompleteItems(){
      const items = [];
      state.groups.forEach(group => {
        const meta = getGroupMeta(group);
        if (group.type === 'knockout') {
          buildKnockoutMatches(group.rows).forEach(match => {
            if (!isKnockoutMatchFilled(match.rows, meta.sport)) {
              items.push({
                sport: meta.sport,
                subgroup: meta.subgroup,
                code: match.code,
                label: `${meta.sport} · ${meta.subgroup} · ${match.teamLabel}`,
                sub: match.stage
              });
            }
          });
          return;
        }
        (group.rows || []).forEach(row => {
          if (normalize(row.col3) === '') {
            items.push({
              sport: meta.sport,
              subgroup: meta.subgroup,
              code: String(row.sheetRow),
              label: `${meta.sport} · ${meta.subgroup} · ${normalize(row.col2) || '항목'}`,
              sub: group.type === 'ranking' ? '기록형' : '이어달리기'
            });
          }
        });
      });
      return items;
    }

    function buildReverseUpdates(originalRows, updates){
      const originalMap = new Map((originalRows || []).map(row => [String(row.sheetRow), row]));
      return (updates || []).map(update => {
        const original = originalMap.get(String(update.sheetRow));
        if (!original) return null;
        const reversed = { sheetRow: update.sheetRow };
        Object.keys(update).forEach(key => {
          if (key === 'sheetRow') return;
          reversed[key] = original[key] ?? '';
        });
        return reversed;
      }).filter(Boolean);
    }

    async function undoLastSave(){
      if (!state.pendingUndo || !Array.isArray(state.pendingUndo.updates) || !state.pendingUndo.updates.length) return;
      const label = state.pendingUndo.label || '직전 저장';
      const updates = state.pendingUndo.updates;
      if (!window.confirm(`${label} 내용을 이전 값으로 되돌릴까요?`)) return;
      const prevUndo = state.pendingUndo;
      try {
        if (els.undoBtnTop) els.undoBtnTop.disabled = true;
        setStatus('직전 저장을 되돌리는 중입니다...', 'info');
        await saveRows(updates, '되돌리기');
        clearPendingUndo();
        setStatus('직전 저장을 되돌렸습니다.', 'success');
      } catch (error) {
        state.pendingUndo = prevUndo;
        persistPendingUndo();
        renderPendingUndo();
      }
    }

    function renderSelectors(){
      if (!state.groups.length) {
        els.selectorWrap.innerHTML = '<div class="empty">표시할 종목이 없습니다.</div>';
        return;
      }

      const sportList = getSportList();
      const subgroupList = state.selectedSport ? getSubgroupList(state.selectedSport) : [];

      const sportButtons = sportList.map(sport => `
        <button type="button" class="selector-chip ${sport === state.selectedSport ? 'active' : ''}" data-sport="${escapeHtml(sport)}">${escapeHtml(sport)}</button>
      `).join('');

      const subgroupButtons = subgroupList.map(subgroup => `
        <button type="button" class="selector-chip ${subgroup === state.selectedSubgroup ? 'active' : ''}" data-subgroup="${escapeHtml(subgroup)}">${escapeHtml(subgroup)}</button>
      `).join('');

      els.selectorWrap.innerHTML = `
        <div class="field">
          <div id="sport-filter-group" class="selector-grid">${sportButtons}</div>
        </div>
        <div class="field">
          <label>하위 구분 선택</label>
          <div id="subgroup-filter-group" class="selector-grid subgroup-grid">${subgroupButtons || '<div class="empty">종목을 먼저 선택하세요.</div>'}</div>
        </div>
      `;

      els.selectorWrap.querySelectorAll('[data-sport]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedSport = btn.dataset.sport;
          const subgroupList = getSubgroupList(state.selectedSport);
          state.selectedSubgroup = subgroupList.includes('전체') ? '전체' : '';
          renderSelectors();
          renderEditor();
        });
      });

      els.selectorWrap.querySelectorAll('[data-subgroup]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedSubgroup = btn.dataset.subgroup;
          renderSelectors();
          renderEditor();
        });
      });
    }

    function cloneRows(rows){
      return rows.map(row => ({ ...row }));
    }

    function applyUpdatesToRows(rows, updates){
      const cloned = cloneRows(rows);
      const map = new Map(cloned.map(row => [String(row.sheetRow), row]));
      (updates || []).forEach(update => {
        const target = map.get(String(update.sheetRow));
        if (!target) return;
        Object.keys(update).forEach(key => {
          if (key !== 'sheetRow') target[key] = update[key];
        });
      });
      return cloned;
    }

    function getWinnerName(matchRows){
      if (!Array.isArray(matchRows) || matchRows.length === 0) return '';
      if (matchRows.length === 1) return normalize(matchRows[0].col2);
      const [a, b] = matchRows;
      const aName = normalize(a.col2);
      const bName = normalize(b.col2);
      if (!aName || !bName) return '';

      const aScore = parseNumber(a.col3);
      const bScore = parseNumber(b.col3);
      if (aScore == null || bScore == null) return '';
      if (aScore > bScore) return aName;
      if (bScore > aScore) return bName;

      const aPk = parseNumber(a.col4);
      const bPk = parseNumber(b.col4);
      if (aPk == null || bPk == null) return '';
      if (aPk > bPk) return aName;
      if (bPk > aPk) return bName;
      return '';
    }

    function projectKnockoutRows(rows){
      const cloned = cloneRows(rows);
      const byCode = {};
      cloned.forEach(row => {
        const code = normalize(row.col6);
        if (!code) return;
        if (!byCode[code]) byCode[code] = [];
        byCode[code].push(row);
      });
      Object.keys(byCode).forEach(code => {
        byCode[code].sort((a, b) => Number(a.sheetRow) - Number(b.sheetRow));
      });

      function setParticipants(code, names){
        const targetRows = byCode[code] || [];
        targetRows.forEach((row, index) => {
          const nextName = normalize(names[index] || '');
          const prevName = normalize(row.col2);
          if (prevName !== nextName) {
            row.col2 = nextName;
            row.col3 = '';
            row.col4 = '';
          } else {
            row.col2 = nextName;
          }
        });
      }

      const byeWinner = getWinnerName(byCode['BYE_SF'] || []);
      const qf1Winner = getWinnerName(byCode['QF1'] || []);
      const qf2Winner = getWinnerName(byCode['QF2'] || []);
      const qf3Winner = getWinnerName(byCode['QF3'] || []);

      setParticipants('SF1', [byeWinner, qf1Winner]);
      setParticipants('SF2', [qf2Winner, qf3Winner]);

      const sf1Winner = getWinnerName(byCode['SF1'] || []);
      const sf2Winner = getWinnerName(byCode['SF2'] || []);

      setParticipants('F', [sf1Winner, sf2Winner]);
      return cloned;
    }

    function buildAutoAdvanceUpdates(originalRows){
      const projected = projectKnockoutRows(originalRows);
      const originalMap = new Map(originalRows.map(row => [String(row.sheetRow), row]));
      const updates = [];

      projected.forEach(row => {
        const original = originalMap.get(String(row.sheetRow));
        if (!original) return;
        const changed = { sheetRow: row.sheetRow };
        let hasChange = false;
        ['col2','col3','col4'].forEach(field => {
          if (normalize(original[field]) !== normalize(row[field])) {
            changed[field] = row[field];
            hasChange = true;
          }
        });
        if (hasChange) updates.push(changed);
      });
      return updates;
    }

    function buildKnockoutMatches(rows){
      const displayRows = projectKnockoutRows(rows);
      const bucket = new Map();
      displayRows.forEach((row, index) => {
        const code = normalize(row.col6) || `ROW_${index + 1}`;
        if (!bucket.has(code)) bucket.set(code, []);
        bucket.get(code).push(row);
      });

      const stageOrder = { '부전승': 0, '예선': 1, '준결승': 2, '결승': 3 };
      const matches = Array.from(bucket.entries()).map(([code, matchRows], index) => {
        matchRows.sort((a, b) => Number(a.sheetRow) - Number(b.sheetRow));
        const stage = normalize(matchRows[0]?.col5) || `경기 ${index + 1}`;
        const teamNames = matchRows.map(row => normalize(row.col2) || '미정');
        const teamLabel = teamNames.length >= 2 ? `${teamNames[0]} vs ${teamNames[1]}` : teamNames[0];
        return { code, stage, rows: matchRows, teamLabel };
      });

      matches.sort((a, b) => {
        const aRank = stageOrder[a.stage] ?? 9;
        const bRank = stageOrder[b.stage] ?? 9;
        if (aRank !== bRank) return aRank - bRank;
        return a.code.localeCompare(b.code, 'ko');
      });
      return matches;
    }


    function getTargetCodeForMatch(code){
      if (['BYE_SF','QF1'].includes(code)) return 'SF1';
      if (['QF2','QF3'].includes(code)) return 'SF2';
      if (['SF1','SF2'].includes(code)) return 'F';
      return '';
    }

    function getGroupEditorMode(group){
      const key = group?.bracketKey || `${getGroupMeta(group).sport}__${getGroupMeta(group).subgroup}`;
      return state.editorModeByGroup[key] || 'input';
    }

    function setGroupEditorMode(group, mode){
      const key = group?.bracketKey || `${getGroupMeta(group).sport}__${getGroupMeta(group).subgroup}`;
      state.editorModeByGroup[key] = mode;
    }

    function buildEditorModeTabs(group, mode, hasInputItems, hasEditItems, inputLabel='경기 입력', editLabel='결과 수정'){
      return `
        <div class="field">
          <div class="selector-grid subgroup-grid">
            <button type="button" class="selector-chip ${mode === 'input' ? 'active' : ''}" data-editor-mode="input" ${hasInputItems ? '' : 'disabled'}>${inputLabel}</button>
            <button type="button" class="selector-chip ${mode === 'edit' ? 'active' : ''}" data-editor-mode="edit" ${hasEditItems ? '' : 'disabled'}>${editLabel}</button>
          </div>
        </div>
      `;
    }

    function bindEditorModeTabs(group){
      els.editorWrap.querySelectorAll('[data-editor-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          setGroupEditorMode(group, btn.dataset.editorMode);
          renderEditor();
        });
      });
    }

    function renderEditor(){
      const group = getSelectedGroup();
      if (!group) {
        els.editorWrap.innerHTML = `<div class="empty">${state.selectedSport ? '하위 구분을 선택하세요.' : '종목을 먼저 선택하세요.'}</div>`;
        return;
      }

      if (group.type === 'knockout') {
        renderKnockoutGroup(group);
        return;
      }
      if (group.type === 'ranking') {
        renderSimpleRowsGroup(group, 'ranking');
        return;
      }
      renderSimpleRowsGroup(group, 'relay');
    }

    function renderKnockoutGroup(group){
      const matches = buildKnockoutMatches(group.rows);
      const inputMatches = matches.filter(match => !isKnockoutMatchFilled(match.rows, getGroupMeta(group).sport));
      const editMatches = matches.filter(match => isKnockoutMatchFilled(match.rows, getGroupMeta(group).sport));
      let mode = getGroupEditorMode(group);
      if (mode === 'input' && !inputMatches.length && editMatches.length) mode = 'edit';
      if (mode === 'edit' && !editMatches.length && inputMatches.length) mode = 'input';
      setGroupEditorMode(group, mode);

      const sourceMatches = mode === 'edit' ? editMatches : inputMatches;
      const emptyMessage = mode === 'edit' ? '수정할 경기 결과가 없습니다.' : '입력할 경기가 없습니다.';
      const modeTabs = buildEditorModeTabs(group, mode, inputMatches.length > 0, editMatches.length > 0);
      if (!sourceMatches.length) {
        els.editorWrap.innerHTML = `${modeTabs}<div class="empty">${emptyMessage}</div>`;
        bindEditorModeTabs(group);
        return;
      }

      const remembered = state.selectedMatchByGroup[group.bracketKey] || state.selectedMatchByGroup[`${getGroupMeta(group).sport}__${getGroupMeta(group).subgroup}`];
      const selectedCode = sourceMatches.some(match => match.code === remembered) ? remembered : sourceMatches[0].code;
      state.selectedMatchByGroup[group.bracketKey] = selectedCode;

      const options = sourceMatches.map((match, index) => {
        const prefix = mode === 'edit' ? '수정 · ' : '';
        return `<option value="${escapeHtml(match.code)}" ${match.code === selectedCode ? 'selected' : ''}>${escapeHtml(`${prefix}${match.teamLabel} · ${match.stage}`)}</option>`;
      }).join('');

      els.editorWrap.innerHTML = `
        ${modeTabs}
        <div class="field">
          <label for="matchSelect">${mode === 'edit' ? '수정할 경기 선택' : '경기 선택하기'}</label>
          <select id="matchSelect" class="select">${options}</select>
        </div>
        <div id="matchEditor"></div>
      `;

      bindEditorModeTabs(group);
      const matchSelect = document.getElementById('matchSelect');
      const matchEditor = document.getElementById('matchEditor');

      const draw = () => {
        state.selectedMatchByGroup[group.bracketKey] = matchSelect.value;
        const currentMatch = sourceMatches.find(match => match.code === matchSelect.value) || sourceMatches[0];
        matchEditor.innerHTML = buildKnockoutEditorHtml(group, currentMatch, mode);
        bindKnockoutSave(group, currentMatch, mode);
      };

      matchSelect.addEventListener('change', draw);
      draw();
    }

    function buildKnockoutEditorHtml(group, match, mode='input'){
      const rows = match.rows || [];
      const teamsHtml = rows.map((row, index) => {
        return `
          <div class="team-box">
            <div class="team-name">${escapeHtml(normalize(row.col2) || `미정 ${index + 1}`)}</div>
            <div class="grid2">
              <div>
                <label>점수</label>
                <select class="select" data-role="score" data-row="${row.sheetRow}">
                  ${buildNumberOptions(0, 30, row.col3)}
                </select>
              </div>
              ${sportSupportsPk(state.selectedSport) ? `
              <div>
                <label>PK</label>
                <select class="select" data-role="pk" data-row="${row.sheetRow}">
                  ${buildPkOptions(row.col4)}
                </select>
              </div>` : ''}
            </div>
            
          </div>
        `;
      }).join('');

      return `
        <div class="match-card">
          <div class="match-head">
            <div>
              <div class="match-title">${escapeHtml(match.teamLabel)}</div>
              <div class="match-sub">${escapeHtml(match.stage)}</div>
            </div>
            <span class="pill">토너먼트</span>
          </div>
          ${teamsHtml}
          <div class="sticky-save">
            ${mode === 'edit' ? '<button type="button" id="saveKnockoutBtn" class="btn btn-primary">이 경기 수정 저장</button>' : '<button type="button" id="saveKnockoutBtn" class="btn btn-primary">이 경기 저장</button>'}
          </div>
        </div>
      `;
    }

    function bindKnockoutSave(group, match, mode='input'){
      const btn = document.getElementById('saveKnockoutBtn');
      if (!btn) return;

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '저장 중...';
        setStatus(`${match.teamLabel} ${mode === 'edit' ? '수정 저장' : '저장'} 중입니다...`, 'info');

        try {
          const manualUpdates = (match.rows || []).map(row => {
            const scoreEl = document.querySelector(`[data-role="score"][data-row="${row.sheetRow}"]`);
            const pkEl = document.querySelector(`[data-role="pk"][data-row="${row.sheetRow}"]`);
            return {
              sheetRow: row.sheetRow,
              col3: scoreEl ? scoreEl.value : '',
              col4: sportSupportsPk(state.selectedSport) ? (pkEl ? pkEl.value : '') : row.col4
            };
          });

          if (['준결승','결승'].includes(match.stage)) {
            const ok = window.confirm(`${match.stage} 경기입니다. ${match.teamLabel} 결과를 저장할까요?`);
            if (!ok) {
              btn.textContent = originalText;
              btn.disabled = false;
              setStatus('저장을 취소했습니다.', 'info');
              return;
            }
          }

          const mergedRows = applyUpdatesToRows(group.rows, manualUpdates);
          const autoUpdates = buildAutoAdvanceUpdates(mergedRows);
          const combined = mergeUpdates([...manualUpdates, ...autoUpdates]);
          const reverseUpdates = buildReverseUpdates(group.rows, combined);

          await saveRows(combined, `${match.teamLabel} 저장`);
          setPendingUndo({ label: `${state.selectedSport} · ${state.selectedSubgroup} · ${match.teamLabel}`, updates: reverseUpdates, savedAt: new Date().toISOString() });
          pushRecentSave(`${state.selectedSport} · ${state.selectedSubgroup}`, `${match.teamLabel} · ${match.stage}`);
          btn.textContent = '저장 완료';
          setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          }, 900);
        } catch (error) {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });
    }

    function renderSimpleRowsGroup(group, mode){
      const inputRows = (group.rows || []).filter(row => normalize(row.col3) === '');
      const editRows = (group.rows || []).filter(row => normalize(row.col3) !== '');
      let editorMode = getGroupEditorMode(group);
      if (editorMode === 'input' && !inputRows.length && editRows.length) editorMode = 'edit';
      if (editorMode === 'edit' && !editRows.length && inputRows.length) editorMode = 'input';
      setGroupEditorMode(group, editorMode);

      const visibleRows = editorMode === 'edit' ? editRows : inputRows;
      const emptyMessage = editorMode === 'edit' ? '수정할 항목이 없습니다.' : '입력할 항목이 없습니다.';
      const modeTabs = buildEditorModeTabs(group, editorMode, inputRows.length > 0, editRows.length > 0, '항목 입력', '결과 수정');
      if (!visibleRows.length) {
        els.editorWrap.innerHTML = `${modeTabs}<div class="empty">${emptyMessage}</div>`;
        bindEditorModeTabs(group);
        return;
      }

      const remembered = state.selectedMatchByGroup[group.bracketKey] || state.selectedMatchByGroup[`${getGroupMeta(group).sport}__${getGroupMeta(group).subgroup}`];
      const selectedRow = visibleRows.some(row => String(row.sheetRow) === String(remembered)) ? String(remembered) : String(visibleRows[0].sheetRow);
      state.selectedMatchByGroup[group.bracketKey] = selectedRow;

      const options = visibleRows.map((row, index) => {
        const label = `${normalize(row.col2) || '항목'}`;
        return `<option value="${row.sheetRow}" ${String(row.sheetRow) === selectedRow ? 'selected' : ''}>${escapeHtml(label)}</option>`;
      }).join('');

      els.editorWrap.innerHTML = `
        ${modeTabs}
        <div class="field">
          <label for="rowSelect">${editorMode === 'edit' ? '수정할 항목 선택' : '항목 선택하기'}</label>
          <select id="rowSelect" class="select">${options}</select>
        </div>
        <div id="rowEditor"></div>
      `;

      bindEditorModeTabs(group);
      const rowSelect = document.getElementById('rowSelect');
      const rowEditor = document.getElementById('rowEditor');

      const draw = () => {
        state.selectedMatchByGroup[group.bracketKey] = rowSelect.value;
        const currentRow = visibleRows.find(row => String(row.sheetRow) === String(rowSelect.value)) || visibleRows[0];
        rowEditor.innerHTML = buildSimpleEditorHtml(group, currentRow, mode, editorMode);
        bindSimpleSave(group, currentRow, mode, editorMode);
      };

      rowSelect.addEventListener('change', draw);
      draw();
    }

    function buildSimpleEditorHtml(group, row, mode, editorMode='input'){
      const tag = mode === 'ranking' ? '기록형' : '이어달리기';
      const label1 = mode === 'ranking' ? '기록 / 순위 값' : '결과 / 순위';
      const label2 = mode === 'ranking' ? '비고' : '상태 / 비고';

      return `
        <div class="match-card">
          <div class="match-head">
            <div>
              <div class="match-title">${escapeHtml(normalize(row.col2) || '항목')}</div>
              <div class="match-sub">바로 값을 입력한 뒤 저장하세요.</div>
            </div>
            <span class="pill">${tag}</span>
          </div>
          <div class="field">
            <label>${label1}</label>
            <input id="value1" class="input" value="${escapeHtml(normalize(row.col3))}" placeholder="값 입력" />
          </div>
          <div class="field">
            <label>${label2}</label>
            <input id="value2" class="input" value="${escapeHtml(normalize(row.col4))}" placeholder="비고 입력" />
          </div>
          <div class="sticky-save">
            ${editorMode === 'edit' ? '<button type="button" id="saveSimpleBtn" class="btn btn-primary">이 항목 수정 저장</button>' : '<button type="button" id="saveSimpleBtn" class="btn btn-primary">이 항목 저장</button>'}
          </div>
        </div>
      `;
    }

    function bindSimpleSave(group, row, mode, editorMode='input'){
      const btn = document.getElementById('saveSimpleBtn');
      if (!btn) return;

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = '저장 중...';
        setStatus(`${normalize(row.col2) || '항목'} ${editorMode === 'edit' ? '수정 저장' : '저장'} 중입니다...`, 'info');

        try {
          const value1 = document.getElementById('value1');
          const value2 = document.getElementById('value2');
          const simpleUpdates = [
            {
              sheetRow: row.sheetRow,
              col3: value1 ? value1.value.trim() : '',
              col4: value2 ? value2.value.trim() : ''
            }
          ];
          const reverseUpdates = buildReverseUpdates(group.rows, simpleUpdates);
          await saveRows(simpleUpdates, `${normalize(row.col2) || '항목'} 저장`);
          setPendingUndo({ label: `${state.selectedSport} · ${state.selectedSubgroup} · ${normalize(row.col2) || '항목'}`, updates: reverseUpdates, savedAt: new Date().toISOString() });
          pushRecentSave(`${state.selectedSport} · ${state.selectedSubgroup}`, `${normalize(row.col2) || '항목'} 저장`);
          btn.textContent = '저장 완료';
          setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          }, 900);
        } catch (error) {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });
    }

    function buildNumberOptions(min, max, selectedValue){
      const current = normalize(selectedValue);
      let html = '<option value="">선택</option>';
      for (let i = min; i <= max; i += 1) {
        const value = String(i);
        html += `<option value="${value}" ${current === value ? 'selected' : ''}>${value}</option>`;
      }
      return html;
    }

    function buildPkOptions(selectedValue){
      const current = normalize(selectedValue);
      let html = `<option value="" ${current === '' ? 'selected' : ''}>없음</option>`;
      for (let i = 0; i <= 20; i += 1) {
        const value = String(i);
        html += `<option value="${value}" ${current === value ? 'selected' : ''}>${value}</option>`;
      }
      return html;
    }

    function mergeUpdates(updateList){
      const map = new Map();
      updateList.forEach(update => {
        const key = String(update.sheetRow);
        const current = map.get(key) || { sheetRow: update.sheetRow };
        Object.keys(update).forEach(field => {
          if (field !== 'sheetRow') current[field] = update[field];
        });
        map.set(key, current);
      });
      return Array.from(map.values());
    }

    async function saveRows(updates, label='저장'){
      const baseUrl = els.scriptUrl.value.trim();
      const adminKey = els.adminKey.value.trim();
      const urlCheck = validateScriptUrl(baseUrl);
      if (!urlCheck.ok) {
        setStatus(urlCheck.message, 'error');
        throw new Error(urlCheck.message);
      }
      if (!adminKey) {
        setStatus('관리자 키가 비어 있습니다.', 'error');
        throw new Error('관리자 키가 비어 있습니다.');
      }

      try {
        const res = await fetch(baseUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'saveRows',
            adminKey,
            updates
          })
        });
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || '저장하지 못했습니다.');
        setStatus(json.message || `${label} 완료`, 'success');
        await loadGroups(false);
      } catch (error) {
        setStatus(error.message || '저장하지 못했습니다.', 'error');
        throw error;
      }
    }
  </script>
</body>
